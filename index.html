<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:linear-gradient(135deg,#FFFBF0 0%,#FFF4D8 100%);display:flex;justify-content:center;align-items:center;font-family:'PingFang SC','Microsoft YaHei',sans-serif;padding:20px;}
.main-wrapper{display:flex;gap:12px;align-items:flex-start;max-width:600px;width:100%;}
.lottery-container{background:#fff;border-radius:24px;padding:28px 22px 22px;box-shadow:0 10px 40px rgba(232,52,28,.12);flex:1;text-align:center;border:2px solid #F0D28A;position:relative;}
.lottery-title{font-size:24px;font-weight:800;color:#C8270E;margin-bottom:4px;cursor:default;user-select:none;}
.lottery-subtitle{font-size:13px;color:#7A5410;margin-bottom:6px;}
.lottery-rules{font-size:11px;color:#A68A5C;margin-bottom:20px;}
.lottery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.prize-cell{aspect-ratio:1/1;background:linear-gradient(135deg,#FFF9E6,#FFF0C0);border:2.5px solid #F0D28A;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#B8750A;transition:background .08s,border-color .08s,transform .08s,box-shadow .08s;user-select:none;}
.prize-label{font-size:10px;margin-top:3px;font-weight:600;}
.prize-center{aspect-ratio:1/1;background:linear-gradient(135deg,#E8341C,#C8270E);border:3px solid #FFD700;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(232,52,28,.45);animation:centerPulse 1.8s infinite;user-select:none;letter-spacing:2px;transition:transform .1s ease;}
.prize-center:active{transform:scale(.93);}
.prize-center.done{pointer-events:none;opacity:.7;animation:none;}
.result-area{min-height:50px;margin-bottom:14px;font-weight:700;color:#C8270E;font-size:14px;line-height:1.6;}
.result-big{font-size:20px;display:block;}
.result-prize{font-size:26px;color:#FF4500;display:block;margin-top:4px;text-shadow:0 0 12px rgba(255,215,0,.8);}
.btn-kefu{display:inline-block;background:#E8341C;color:#fff;font-weight:700;font-size:13px;padding:10px 22px;border-radius:24px;text-decoration:none;box-shadow:0 4px 14px rgba(232,52,28,.35);border:2px solid #FFD700;letter-spacing:1px;}
.btn-kefu:active{transform:scale(.95);}
.footer-note{margin-top:14px;font-size:10px;color:#B0A080;}
@keyframes centerPulse{0%,100%{box-shadow:0 6px 20px rgba(232,52,28,.45);}50%{box-shadow:0 6px 32px rgba(232,52,28,.75),0 0 0 10px rgba(232,52,28,.12);}}
@keyframes winGlow{from{box-shadow:0 0 18px rgba(255,215,0,.7),0 0 40px rgba(255,140,0,.35);}to{box-shadow:0 0 35px rgba(255,215,0,1),0 0 65px rgba(255,140,0,.6);}}
@keyframes resultBounce{0%{transform:scale(.2);opacity:0;}50%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
@media(max-width:520px){.main-wrapper{flex-direction:column;align-items:center;}.record-sidebar{width:100%;max-width:420px;}}
@media(max-width:380px){.lottery-container{padding:20px 14px 16px;border-radius:18px;}.lottery-title{font-size:20px;}.prize-cell{font-size:22px;}.lottery-grid{gap:7px;}}

.remain-info{font-size:13px;color:#7A5410;margin-top:8px;font-weight:600;min-height:20px;}

/* 侧边记录面板 */
.record-sidebar{width:180px;flex-shrink:0;}
.record-toggle{background:#fff;border-radius:16px;padding:12px;box-shadow:0 4px 20px rgba(232,52,28,.1);border:2px solid #F0D28A;cursor:pointer;text-align:center;transition:all .3s;}
.record-toggle:hover{background:#FFF9E6;}
.record-toggle-icon{font-size:24px;margin-bottom:4px;}
.record-toggle-text{font-size:12px;color:#7A5410;font-weight:700;}
.record-panel{background:#fff;border-radius:16px;padding:14px;box-shadow:0 4px 20px rgba(232,52,28,.1);border:2px solid #F0D28A;margin-top:8px;display:none;max-height:400px;overflow-y:auto;}
.record-panel.show{display:block;}
.record-panel-title{font-size:13px;color:#7A5410;font-weight:700;margin-bottom:10px;text-align:center;border-bottom:1px solid #F0D28A;padding-bottom:6px;}
.record-item{padding:6px 0;border-bottom:1px dashed #F0D28A;font-size:11px;}
.record-item:last-child{border-bottom:none;}
.record-time{color:#A68A5C;font-size:10px;}
.record-prize{color:#C8270E;font-weight:700;}
.record-pts{color:#B8750A;}
.record-empty{text-align:center;color:#A68A5C;font-size:12px;padding:20px 0;}
.record-total{margin-top:8px;padding-top:8px;border-top:2px solid #F0D28A;font-size:13px;font-weight:800;color:#C8270E;text-align:center;}
.record-total span{color:#FF4500;font-size:16px;}
</style>
</head>

// ========== 抽奖 ==========
document.getElementById('btnStart').addEventListener('click',function(){
// 抽奖中禁止点击
if(isRunning){
alert('⏳ 正在抽奖中，请稍候...');
return;
}

var hasFirst=_gf();
var cur=_gt();
console.log('点击抽奖按钮，hasFirst='+hasFirst+', cur='+cur);

if(!hasFirst){
_sf();
_st(0);
}else if(cur===null||cur<=0){
alert('次数已用完');
return;
}else{
_st(cur-1);
}

isRunning=true;

var resultText=document.getElementById('resultText');
var btnStart=document.getElementById('btnStart');

resultText.innerHTML='';
btnStart.textContent='...';

// 清除上次中奖高亮
_clearWin();

var prizeObj=_gp();
var winName=prizeObj.name;

var cells=document.querySelectorAll('#lotteryGrid .prize-cell');
var cellsArr=Array.from(cells);

// 找到中奖格子索引
var winIdx=-1;
for(var i=0;i<cellsArr.length;i++){
if(cellsArr[i].getAttribute('data-p')===winName){winIdx=i;break;}
}
if(winIdx===-1)winIdx=0;

// 清除所有样式
for(var i=0;i<cellsArr.length;i++){
cellsArr[i].style.background='';
cellsArr[i].style.borderColor='';
cellsArr[i].style.boxShadow='';
cellsArr[i].style.transform='';
cellsArr[i].style.animation='';
}

// 动画参数
var totalRounds=Math.floor(Math.random()*4)+3;
var totalSteps=cellsArr.length*totalRounds+winIdx+1;
var curIdx=0,prevIdx=-1,stepCount=0,baseSpeed=80;

function highlight(){
if(prevIdx>=0&&prevIdx<cellsArr.length){
cellsArr[prevIdx].style.background='';
cellsArr[prevIdx].style.borderColor='';
cellsArr[prevIdx].style.boxShadow='';
cellsArr[prevIdx].style.transform='';
}

cellsArr[curIdx].style.background='linear-gradient(135deg,#FFE0D0,#FFC0A0)';
cellsArr[curIdx].style.borderColor='#E8341C';
cellsArr[curIdx].style.boxShadow='0 0 18px rgba(232,52,28,.45)';
cellsArr[curIdx].style.transform='scale(1.06)';

prevIdx=curIdx;
stepCount++;

if(stepCount>=totalSteps){
// 清除所有
for(var i=0;i<cellsArr.length;i++){
cellsArr[i].style.background='';
cellsArr[i].style.borderColor='';
cellsArr[i].style.boxShadow='';
cellsArr[i].style.transform='';
cellsArr[i].style.animation='';
}

// 高亮中奖格子（常亮，不熄灭）
var winCell=cellsArr[winIdx];
winCell.style.background='linear-gradient(135deg,#FFD700,#FFA500)';
winCell.style.borderColor='#FF4500';
winCell.style.boxShadow='0 0 30px rgba(255,215,0,.9),0 0 60px rgba(255,140,0,.5)';
winCell.style.transform='scale(1.12)';
winCell.style.animation='winGlow 0.6s ease-in-out infinite alternate';
lastWinCell=winCell;

resultText.innerHTML='<span class="result-big">🎉 恭喜获得</span><span class="result-prize">'+winName+'</span>';
resultText.style.animation='resultBounce 0.5s ease-out';

// 记录中奖（动画结束后）
console.log('动画结束，中奖：'+winName+', 积分：'+prizeObj.pts);
_al(winName,prizeObj.pts);
_ur();

_up();
if(totalRemain>=1){
btnStart.textContent='再抽一次';
btnStart.classList.remove('done');
}else{
btnStart.textContent='已抽完';
btnStart.classList.add('done');
}

isRunning=false;
return;
}

var remaining=totalSteps-stepCount;
var speed=baseSpeed;
if(remaining<cellsArr.length*2){
var slowdown=(cellsArr.length*2-remaining)/(cellsArr.length*2);
speed=baseSpeed+slowdown*120;
}

setTimeout(highlight,speed);
curIdx=(curIdx+1)%cellsArr.length;
}

highlight();
});

// ========== 初始化 ==========
if(_ga()){isAdmin=true;}
_up();
_ur();
})();
